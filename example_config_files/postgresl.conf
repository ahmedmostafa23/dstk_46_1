# -----------------------------
# PostgreSQL configuration file
# -----------------------------
# This is a sample configuration file for PostgreSQL.
# Adjust values based on your hardware and workload.

#------------------------------------------------------------------------------
# CONNECTION AND AUTHENTICATION
#------------------------------------------------------------------------------

listen_addresses = 'localhost'          # what IP address(es) to listen on
port = 5432                             # default port
max_connections = 100                   # max number of concurrent connections
superuser_reserved_connections = 3      # reserved for superuser connections

# - Authentication -
password_encryption = scram-sha-256
authentication_timeout = 1min

#------------------------------------------------------------------------------
# RESOURCE USAGE (except WAL)
#------------------------------------------------------------------------------

# - Memory -
shared_buffers = 256MB                  # typically 25% of total RAM
huge_pages = try
temp_buffers = 8MB
work_mem = 4MB                          # per-operation memory for sorts/hashes
maintenance_work_mem = 64MB             # for VACUUM, CREATE INDEX, etc.
max_stack_depth = 2MB

# - Disk -
temp_file_limit = -1                    # no limit

# - Kernel Resources -
max_files_per_process = 1000

# - Background Writer -
bgwriter_delay = 200ms
bgwriter_lru_maxpages = 100
bgwriter_lru_multiplier = 2.0
bgwriter_flush_after = 512kB

# - Asynchronous Behavior -
effective_io_concurrency = 200          # set higher for SSDs
max_worker_processes = 8
max_parallel_workers_per_gather = 2
max_parallel_maintenance_workers = 2
max_parallel_workers = 8

#------------------------------------------------------------------------------
# WRITE-AHEAD LOG (WAL)
#------------------------------------------------------------------------------

wal_level = replica
fsync = on
synchronous_commit = on
wal_sync_method = fdatasync
wal_compression = off
wal_buffers = -1                        # auto-tuned based on shared_buffers
checkpoint_timeout = 5min
checkpoint_completion_target = 0.9
max_wal_size = 1GB
min_wal_size = 80MB
archive_mode = off
# archive_command = 'cp %p /path/to/archive/%f'

#------------------------------------------------------------------------------
# REPLICATION
#------------------------------------------------------------------------------

max_wal_senders = 10
max_replication_slots = 10
wal_keep_size = 0
hot_standby = on
# primary_conninfo = ''
# primary_slot_name = ''

#------------------------------------------------------------------------------
# QUERY TUNING
#------------------------------------------------------------------------------

# - Planner Cost Constants -
random_page_cost = 1.1                  # lower for SSDs (default 4.0)
effective_cache_size = 768MB            # estimate of OS disk cache
cpu_tuple_cost = 0.01
cpu_index_tuple_cost = 0.005
cpu_operator_cost = 0.0025

# - Genetic Query Optimizer -
geqo = on
geqo_threshold = 12

# - Other Planner Options -
default_statistics_target = 100
constraint_exclusion = partition

#------------------------------------------------------------------------------
# LOGGING
#------------------------------------------------------------------------------

log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 10MB
log_min_messages = warning
log_min_error_statement = error
log_min_duration_statement = 1000       # log queries slower than 1s
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0
log_line_prefix = '%m [%p] %q%u@%d '
log_statement = 'ddl'                   # none, ddl, mod, all
log_timezone = 'UTC'

#------------------------------------------------------------------------------
# AUTOVACUUM
#------------------------------------------------------------------------------

autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_vacuum_scale_factor = 0.2
autovacuum_analyze_threshold = 50
autovacuum_analyze_scale_factor = 0.1
autovacuum_vacuum_cost_delay = 2ms
autovacuum_vacuum_cost_limit = -1

#------------------------------------------------------------------------------
# CLIENT CONNECTION DEFAULTS
#------------------------------------------------------------------------------

search_path = '"$user", public'
default_tablespace = ''
temp_tablespaces = ''
datestyle = 'iso, mdy'
timezone = 'UTC'
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'
default_text_search_config = 'pg_catalog.english'

#------------------------------------------------------------------------------
# LOCK MANAGEMENT
#------------------------------------------------------------------------------

deadlock_timeout = 1s
max_locks_per_transaction = 64

#------------------------------------------------------------------------------
# VERSION AND PLATFORM COMPATIBILITY
#------------------------------------------------------------------------------

array_nulls = on
backslash_quote = safe_encoding
escape_string_warning = on
standard_conforming_strings = on