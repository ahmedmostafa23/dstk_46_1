# ============================================================================
# Apache Airflow Configuration (airflow.cfg)
# ============================================================================
# This is a sample configuration file. Adjust values for your environment.

[core]
# The home folder for Airflow
airflow_home = /opt/airflow

# The executor class to use
# SequentialExecutor | LocalExecutor | CeleryExecutor | KubernetesExecutor
executor = LocalExecutor

# The folder where DAG files are stored
dags_folder = /opt/airflow/dags

# The folder where Airflow plugins are stored
plugins_folder = /opt/airflow/plugins

# Number of processes to parse DAG files (set higher for many DAGs)
parsing_processes = 2

# How often (in seconds) to scan the DAGs directory for new files
dag_dir_list_interval = 300

# How often (in seconds) to re-serialize DAGs
min_serialized_dag_update_interval = 30

# Default timezone
default_timezone = utc

# Whether to load example DAGs
load_examples = False

# Maximum number of active DAG runs per DAG
max_active_runs_per_dag = 16

# Maximum number of active tasks per DAG run
max_active_tasks_per_dag = 16

# Default task retries
default_task_retries = 0

# Default task retry delay (seconds)
default_task_retry_delay = 300

# Secret key for signing session cookies and CSRF tokens
# CHANGE THIS in production!
fernet_key = YOUR_FERNET_KEY_HERE

# Whether to enable XCom pickling (disabled for security)
enable_xcom_pickling = False

# Dagbag import timeout
dagbag_import_timeout = 30.0

# Task execution timeout
task_execution_timeout = 0

# Kill zombie tasks after this many seconds
killed_task_cleanup_time = 60

[database]
# The SQLAlchemy connection string to the metadata database
# PostgreSQL example:
sql_alchemy_conn = postgresql+psycopg2://airflow:airflow@localhost:5432/airflow

# Pool size for SQLAlchemy
sql_alchemy_pool_size = 5
sql_alchemy_max_overflow = 10
sql_alchemy_pool_recycle = 1800
sql_alchemy_pool_pre_ping = True

# Schema for metadata tables (PostgreSQL only)
# sql_alchemy_schema =

[logging]
# The folder where task logs are stored
base_log_folder = /opt/airflow/logs

# Logging level
logging_level = INFO
fab_logging_level = WARNING

# Log format
log_format = [%%(asctime)s] {%%(filename)s:%%(lineno)d} %%(levelname)s - %%(message)s
simple_log_format = %%(asctime)s %%(levelname)s - %%(message)s

# Remote logging (e.g., S3, GCS)
remote_logging = False
# remote_log_conn_id = my_s3_conn
# remote_base_log_folder = s3://my-bucket/airflow/logs
# encrypt_s3_logs = False

# Log filename template
log_filename_template = dag_id={{ ti.dag_id }}/run_id={{ ti.run_id }}/task_id={{ ti.task_id }}/attempt={{ try_number }}.log

[webserver]
# The ip to bind the web server to (0.0.0.0 for all interfaces)
web_server_host = 0.0.0.0

# The port on which to run the web server
web_server_port = 8080

# Number of workers (gunicorn)
workers = 4

# Worker class
worker_class = sync

# Worker timeout
web_server_worker_timeout = 120

# Secret key for Flask sessions
# CHANGE THIS in production!
secret_key = YOUR_SECRET_KEY_HERE

# Web server base URL
base_url = http://localhost:8080

# Enable RBAC (recommended)
rbac = True

# Default UI timezone
default_ui_timezone = UTC

# Expose config in the UI (disable in production)
expose_config = False

# Default DAG view: grid, graph, duration, gantt, landing_times
dag_default_view = grid

# Default DAGs per page in the list view
page_size = 100

# Whether to enable rate limiting
enable_proxy_fix = False

# Session lifetime in minutes
session_lifetime_minutes = 43200

[scheduler]
# How often (in seconds) the scheduler checks for new tasks to run
scheduler_heartbeat_sec = 5

# Number of task instances the scheduler can queue per loop
max_tis_per_query = 512

# How often (in seconds) to check for stalled DAG file processors
scheduler_health_check_threshold = 30

# Orphaned task timeout (seconds)
orphaned_tasks_check_interval = 300.0

# Number of DAG runs to examine per scheduling loop
max_dagruns_to_create_per_loop = 10
max_dagruns_per_loop_to_schedule = 20

# Minimum file process interval (seconds)
min_file_process_interval = 30

# Parsing processes (how many subprocesses to parse DAGs)
parsing_processes = 2

# Trigger timeout
trigger_timeout_check_interval = 10

[operators]
# Default owner for new operators
default_owner = airflow

# Default cpus for task execution
default_cpus = 1

# Default RAM (MB) for task execution
default_ram = 512

# Default disk (MB) for task execution
default_disk = 512

# Default GPUs
default_gpus = 0

[smtp]
# SMTP configuration for email alerts
smtp_host = localhost
smtp_starttls = True
smtp_ssl = False
smtp_port = 587
smtp_user = airflow@example.com
smtp_password = your_smtp_password
smtp_mail_from = airflow@example.com
smtp_timeout = 30
smtp_retry_limit = 5

[celery]
# Celery configuration (only used with CeleryExecutor)

# Broker URL (RabbitMQ or Redis)
broker_url = redis://localhost:6379/0

# Result backend
result_backend = db+postgresql://airflow:airflow@localhost:5432/airflow

# Celery worker concurrency
worker_concurrency = 16

# Celery worker autoscale
# worker_autoscale = 16,12

# Task serialization format
task_serialization = json
result_serialization = json
accept_content = json

# Worker log server port
worker_log_server_port = 8793

# Flower (monitoring UI)
flower_host = 0.0.0.0
flower_port = 5555

# Default celery queue
default_queue = default

# Stalled task timeout
stalled_task_timeout = 0

# Task adoption timeout
task_adoption_timeout = 600

[kubernetes]
# Kubernetes configuration (only used with KubernetesExecutor)

# Namespace for worker pods
namespace = airflow

# Whether to delete worker pods after completion
delete_worker_pods = True
delete_worker_pods_on_failure = False

# Worker pod template file
# worker_pods_creation_batch_size = 1
# pod_template_file = /opt/airflow/pod_template.yaml

# In-cluster config
in_cluster = True

# Cluster context (if not in-cluster)
# cluster_context =
# config_file =

[api]
# API authentication backend
auth_backends = airflow.api.auth.backend.session

# Enable experimental API (legacy, prefer stable REST API)
enable_experimental_api = False

# Access control allow headers
access_control_allow_headers = origin, content-type, accept
access_control_allow_methods = POST, GET, OPTIONS, DELETE
access_control_allow_origins = *

[metrics]
# StatsD configuration for metrics
# statsd_on = False
# statsd_host = localhost
# statsd_port = 8125
# statsd_prefix = airflow

# OpenTelemetry
# otel_on = False
# otel_host = localhost
# otel_port = 4318

[secrets]
# Secrets backend
# backend = airflow.secrets.local_filesystem.LocalFilesystemBackend
# backend_kwargs = {"variables_file_path": "/opt/airflow/secrets/variables.json", "connections_file_path": "/opt/airflow/secrets/connections.json"}

[sentry]
# Sentry integration for error tracking
# sentry_on = False
# sentry_dsn =